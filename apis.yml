name: Google Fonts Developer API
description: >-
  The Google Fonts Developer API provides programmatic access to the metadata for
  all font families served by Google Fonts. Developers can query for available
  font families, retrieve details about variants, subsets, and categories, access
  font file URLs, and work with variable font axis metadata. The API supports
  sorting and filtering to help applications discover and integrate web fonts.
